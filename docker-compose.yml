

# ─────────────────────────────────────────────────────────────
#  AI Learning Roadmap — Docker Compose
#  Database: MongoDB Atlas (cloud) → no local DB container needed
#  Services: backend (Node/Express)  |  frontend (React/Next.js)
# ─────────────────────────────────────────────────────────────

services:

  # ── Backend ──────────────────────────────────────────────────
  backend:
    container_name: lanpya_backend
    build:
      context: ./Backend
      dockerfile: Dockerfile
      target: ${BUILD_TARGET:-development} # dev or production
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-5001}:5000"
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 5000
      MONGODB_URI: ${MONGODB_URI} # Set in .env at project root
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3000}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
    volumes:
      # Hot-reload in development: mount source code
      - ./Backend:/app
      - /app/node_modules # Prevent overwriting container node_modules
      - backend_logs:/app/logs # Persist log files
    networks:
      - lanpya_net
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:5000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Frontend ─────────────────────────────────────────────────
  frontend:
    container_name: lanpya_frontend
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      target: ${BUILD_TARGET:-development}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      VITE_API_URL: ${VITE_API_URL:-http://localhost:5001/api/v1}
    volumes:
      - ./Frontend:/app
      - frontend_node_modules:/app/node_modules  # Named volume — persists node_modules across container recreations
      - /app/.next # Prevent overwriting Next.js build cache
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - lanpya_net

  # ── Nginx Reverse Proxy (production only) ────────────────────
  nginx:
    container_name: lanpya_nginx
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro # Place SSL certs here
    depends_on:
      - backend
      - frontend
    networks:
      - lanpya_net
    profiles:
      - production # Only starts with: docker compose --profile production up

# ─────────────────────────────────────────────────────────────
# Volumes
# ─────────────────────────────────────────────────────────────
volumes:
  backend_logs:
    driver: local
  frontend_node_modules:  # Persists installed node_modules so the container doesn't need to reinstall on every start
    driver: local

# ─────────────────────────────────────────────────────────────
# Networks
# ─────────────────────────────────────────────────────────────
networks:
  lanpya_net:
    driver: bridge
